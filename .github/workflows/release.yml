name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: v
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            V="${{ github.event.inputs.version }}"
          else
            V="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "tag=v$V" >> "$GITHUB_OUTPUT"

      # The tag is the single source of truth — sync every app/package to it.
      - name: Sync versions
        run: node scripts/set-version.mjs "${{ steps.v.outputs.version }}"

      - name: Build release archives
        run: bash apps/desktop/scripts/build-release.sh "v${{ steps.v.outputs.version }}" dist

      # Create the release first, then upload assets via the Releases API — the
      # same reliable path users download from (pattern borrowed from pairux.com,
      # which hit upload-artifact corruption). Re-runs reuse/clobber.
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.v.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG exists — clobbering assets."
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" dist/* \
              --title "TronBrowser $TAG" \
              --generate-notes
          fi

      - name: Summary
        run: |
          echo "Released ${{ steps.v.outputs.tag }} with:" >> "$GITHUB_STEP_SUMMARY"
          ls dist | sed 's/^/- /' >> "$GITHUB_STEP_SUMMARY"
