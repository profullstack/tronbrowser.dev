<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="icon" href="icons/mark.svg" type="image/svg+xml" />
<link rel="stylesheet" href="newtab.css" />
<title>TronBrowser</title>
</head>
<body>
  <header class="top">
    <span id="account" class="account"></span>
    <button id="signin" class="signin">Sign in with CoinPay</button>
  </header>

  <main class="center">
    <img src="icons/favicon.svg" alt="TronBrowser" class="logo" width="84" height="84" />
    <h1 class="brand">Tron<span>Browser</span></h1>
    <p class="tag">privacy-first · de-googled · AI-native</p>

    <form id="search" class="search">
      <div class="modes" role="tablist">
        <button type="button" id="mode-web" class="mode active" aria-selected="true">Web</button>
        <button type="button" id="mode-ai" class="mode" aria-selected="false">AI</button>
      </div>
      <input id="q" type="text" placeholder="Search Xprivo…" autocomplete="off" autofocus />
    </form>

    <nav class="links">
      <a href="https://www.xprivo.com">Xprivo</a>
      <a href="https://duckduckgo.com">DuckDuckGo</a>
      <a href="https://github.com/profullstack/tronbrowser.dev">GitHub</a>
      <a href="https://tronbrowser.dev">tronbrowser.dev</a>
      <a href="#" id="ai">AI Sidebar</a>
      <a href="#" id="settings">Settings</a>
    </nav>
  </main>

  <section class="strip" id="markets-sec" hidden>
    <div class="strip-head"><h2>Markets</h2><button class="edit" id="edit-markets" title="Edit tickers">edit</button></div>
    <div id="markets" class="tickers"></div>
  </section>

  <section class="strip" id="sports-sec" hidden>
    <div class="strip-head"><h2>Sports</h2><button class="edit" id="edit-sports" title="Edit leagues">edit</button></div>
    <div id="sports" class="sportsgrid"></div>
  </section>

  <section class="feeds">
    <div class="feeds-head">
      <h2>Feeds</h2>
      <button id="edit-feeds" title="Edit feeds">edit</button>
    </div>
    <div id="feeds" class="feedgrid"><p class="muted">Loading feeds…</p></div>
  </section>

  <script type="module" src="newtab.js"></script>
</body>
</html>
