<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Connecting to Tor…</title>
<style>
  :root { --bg:#05070d; --panel:#0b1020; --line:#1b2540; --cyan:#34e7ff; --fg:#cfe8ff; --muted:#6f86b3; --purple:#7d4698; }
  * { box-sizing: border-box; }
  html,body { height:100%; margin:0; }
  body { background:var(--bg); color:var(--fg); font:15px/1.6 ui-monospace,"SF Mono",Menlo,monospace;
    display:flex; align-items:center; justify-content:center; }
  .wrap { max-width:520px; padding:32px; text-align:center; }
  .onion { font-size:48px; filter:drop-shadow(0 0 14px rgba(125,70,152,.7)); }
  h1 { font-size:20px; letter-spacing:1px; margin:14px 0 6px; }
  p { color:var(--muted); margin:6px 0; }
  .url { color:var(--cyan); word-break:break-all; font-size:12px; margin-top:10px; }
  .bar { height:8px; background:var(--line); border-radius:6px; overflow:hidden; margin:22px 0 8px; }
  .bar > i { display:block; height:100%; width:5%; background:var(--purple);
    box-shadow:0 0 10px rgba(125,70,152,.8); transition:width .4s ease; }
  .pct { font-size:12px; color:var(--muted); }
  .note { margin-top:18px; font-size:12px; }
  .err { color:#ffcf6e; margin-top:16px; }
  .hidden { display:none; }
  a { color:var(--cyan); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="onion">🧅</div>
    <h1>Connecting to Tor…</h1>
    <p>Reaching this <strong>.onion</strong> site securely. The first connection can take a minute while Tor builds a circuit.</p>
    <div class="bar"><i id="fill"></i></div>
    <div class="pct" id="pct">starting…</div>
    <p class="url" id="url"></p>
    <p class="err hidden" id="err"></p>
    <p class="note">Not Tor-Browser-grade anonymity — for that use the real
      <a href="https://www.torproject.org/" target="_blank" rel="noreferrer">Tor Browser</a>.</p>
  </div>
  <script src="onion-connecting.js"></script>
</body>
</html>
