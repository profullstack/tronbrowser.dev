<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TronBrowser AI — Settings</title>
<style>
  :root { --bg:#05070d; --panel:#0b1020; --line:#1b2540; --cyan:#34e7ff; --fg:#cfe8ff; --muted:#6f86b3; }
  body { background:var(--bg); color:var(--fg); font:14px/1.6 ui-monospace,Menlo,monospace;
    max-width:560px; margin:0 auto; padding:32px 20px; }
  h1 { font-size:20px; } .accent{color:var(--cyan);}
  label { display:block; margin:16px 0 6px; color:var(--muted); }
  input, select { width:100%; padding:10px; background:#04060c; color:var(--fg);
    border:1px solid var(--line); border-radius:8px; font:inherit; }
  button { margin-top:20px; background:var(--cyan); color:#04060c; border:0; border-radius:8px;
    padding:10px 18px; font-weight:700; cursor:pointer; }
  .hint { color:var(--muted); font-size:12px; margin-top:6px; }
  .saved { color:var(--cyan); margin-left:10px; }
</style>
</head>
<body>
  <h1>Tron<span class="accent">AI</span> settings</h1>
  <p class="hint">Bring your own key (free) — keys are stored locally in this browser
    via <code>chrome.storage.local</code> and never sent anywhere but the provider.</p>

  <label for="provider">Provider</label>
  <select id="provider"></select>

  <label for="model">Model</label>
  <input id="model" placeholder="e.g. claude-opus-4-8, gpt-4o, deepseek-chat" />

  <label for="apiKey">API key</label>
  <input id="apiKey" type="password" placeholder="sk-…" />
  <div class="hint" id="keyhint"></div>

  <label for="baseUrl">Base URL (optional override)</label>
  <input id="baseUrl" placeholder="leave blank for default / self-hosted endpoint" />

  <div><button id="save">Save</button><span id="saved" class="saved"></span></div>

  <script type="module" src="options.js"></script>
</body>
</html>
